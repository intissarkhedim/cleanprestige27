<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci · Clean Prestige</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f7f8fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:white;max-width:520px;width:100%;padding:60px 48px;text-align:center;border-top:3px solid #C9A84C;}
.icon{font-size:3.5rem;margin-bottom:24px;}
.title{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:800;color:#0f2d4a;margin-bottom:14px;}
.text{font-family:'Inter',sans-serif;font-size:0.75rem;color:#4a5568;line-height:1.8;margin-bottom:32px;}
.text strong{color:#0f2d4a;}
.btn{display:inline-block;background:#0f2d4a;color:white;font-family:'Inter',sans-serif;font-size:0.58rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:13px 28px;text-decoration:none;border-radius:2px;}
.phone{display:block;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;color:#C9A84C;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <div class="title">Demande envoyée !</div>
  <div class="text">
    Merci pour votre message. Votre demande a bien été transmise à notre équipe.<br><br>
    Nous vous contacterons dans les <strong>24 heures ouvrées</strong> pour vous répondre.<br><br>
    En cas d'urgence, appelez-nous directement :
  </div>
  <span class="phone">02 27 34 13 70 · 06 26 31 59 80</span>
  <br><br>
  <a href="index.html" class="btn">Retour à l'accueil</a>
</div>
</body>
</html>
